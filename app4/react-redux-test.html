<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>React Redux. Day3.</title>
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.1.1/redux.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-redux/7.2.1/react-redux.js"  crossorigin></script>

    <link rel="stylesheet" href="css/base.css">
</head>
<body>
<h1>React Redux.</h1>

<div id="div1"></div>
<div id="div2"></div>
<div id="div3"></div>
<hr/>
<div id="counter"></div>
<div id="div4"></div>

<script>
const log = console.log;

log(Redux);
log('----------------');
log(ReactRedux);

const reducer = (state, action={type:'RESET'}) =>
{
    log(`counter: ${state.counter}, action type: ${action.type}.`);

    switch (action.type) {
        case 'PLUS': return {...state, counter: state.counter + 1}; break;
        case 'MINUS': return {...state, counter: state.counter - 1}; break;
        case 'RESET': return {...state, counter: 0}; break;
        default: return state;
    }
};

const init_state = {counter:0, k1:0, k2:{}};
const store = Redux.createStore(reducer,init_state);

</script>


<script type="text/babel">

class Counter extends React.Component
{
    render(){
        return <div>
            <h2>State Counter: {this.props.counter}</h2>
        </div>

    }
}


class Button extends React.Component
{
    constructor(props) {
        super(props);
        this.state = {counter:0};
        this.clickHandler = this.clickHandler.bind(this);

    }

    clickHandler(){
        this.setState( state => ({counter: state.counter+1}) );
        log(this.props);
        this.props.dispatchStore(this.props.type);
    }

    render(){
        return <div>
            <button style={{color:this.props.color}} onClick={this.clickHandler}>
             Counter: {this.state.counter}, type: {this.props.type}
            </button>
        </div>
    }

}


ReactDOM.render(<Counter />, document.getElementById('counter'));
ReactDOM.render(<Button color="black"/>, document.getElementById('div4') );


function mapState2Props(gstate) {
    return {counter: gstate.counter};
}

function mapDispatch2Props(dispatch) {
    return  {dispatchStore: (data) => dispatch({type:data})}
}

const GlobalCounter = ReactRedux.connect(mapState2Props)(Counter);
const ButtonCounter = ReactRedux.connect(null,mapDispatch2Props)(Button);

const Provider = ReactRedux.Provider;

ReactDOM.render(
    <div>
        <Provider store={store}>
         <GlobalCounter />
         <ButtonCounter color="blue" type="RESET"/>
         <ButtonCounter color="green" type="MINUS"/>
         <ButtonCounter color="red" type="PLUS"/>
        </Provider>
    </div>, document.getElementById('div3')
);

</script>

</body>
</html>
