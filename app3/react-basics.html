<body>

<h1>REACT DAY1</h1>
<div id="div1"></div>
<hr/>
<div id="div2"></div>
<hr/>
<div id="div3"></div>
<hr/>
<div id="div4"></div>
<hr/>
<div id="div5"></div>

<script type="text/javascript">

class Com1 extends React.Component
{
    render(){
    const t1 = React.createElement("li",null,'Books');
    const t2 = React.createElement("li",null,'Papers');
    ///...

    return  React.createElement("ul",null, t1, t2);

    }
}

const re1= React.createElement("h2",null, "React works!! Реакт работает!");
const re2= React.createElement("div", {id:"data1", className: "section"}, "Reacting fast!! Реакт работает!");

ReactDOM.render(re1, document.querySelector('#div1'));
ReactDOM.render(re2, document.querySelector('#div2'))
ReactDOM.render( React.createElement(Com1,null), document.querySelector('#div3'))

let cats =['Books','Papers','Journals','Карандаши','Ластики'];

class Cats extends React.Component
{
    render(){
        let re1 = React.createElement('h2', null, this.props.title);

        let cat_list = this.props.cats.map( (val,k) =>
        React.createElement('li', {key: k}, val));

        return
        React.createElement('ol', null, cat_list.reverse());
    }
}


</script>

<!--JSX-->
<script type="text/babel">

    class Cats2 extends React.Component
    {
        render(){

            let cat_list = this.props.cats.map( (val,k) =>
                React.createElement('li', {key: k}, val));

            return (
                <div>
                    <h2> {this.props.title} </h2>
                    <ol> {cat_list.reverse()} </ol>
                </div>
                   );
                 }
    }


    class Com2 extends React.Component
    {
        render(){
            return (
            <React.Fragment>
            <h2>{this.props.title}</h2>
            <ul>
                <li>Books</li>
                <li>Papers</li>
                <li>Journals</li>
            </ul>
            </React.Fragment>);
           }
    }


ReactDOM.render( <Com2 title="Категории товаров"/>, document.querySelector('#div4'))
ReactDOM.render( <Cats2 cats={[...cats,'Точилки']} title="Categories:"/>, document.querySelector('#div5'))


</script>



</body>
</html>
